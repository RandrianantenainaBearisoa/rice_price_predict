services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - prometheus_monitoring

volumes:
  grafana_data:

networks:
  prometheus_monitoring:
    external: true