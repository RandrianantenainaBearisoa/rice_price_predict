name: Continuous Delivery Workflow

on:
  push:
    branches:
      - prod

jobs:
  Check_what_to_do:
    runs-on: ubuntu-latest
    outputs:
      scenario: ${{ steps.get-scenario.outputs.scenario }}
    steps:
      - uses: actions/checkout@v3

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44

      - name: List modified files
        id: get-scenario
        run: |
          modified=()
          for file in ${{ steps.changed-files.outputs.modified_files}}; do
            top_level="${file%%/*}"
            modified+=("$top_level")
          done
          directories=($(echo "${modified[@]}" | tr ' ' '\n' | sort -u | tr '\n' ' '))
          declare -i scenario=0
          for dir in "${directories[@]}"; do
            if [[ "$dir" == "frontend" ]]; then
                scenario=scenario+1
            fi
            if [[ "$dir" == "backend" ]]; then
                scenario=scenario+2
            fi
          done
          echo "scenario=$scenario" >> $GITHUB_OUTPUT
          echo "Scenario: $scenario"
  Build_and_Push:
    needs: Check_what_to_do
    runs-on: ubuntu-latest
    if: needs.Check_what_to_do.outputs.scenario != 0
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Image
        run: |
          case ${{ needs.Check_what_to_do.outputs.scenario }} in
            1)
              echo "Only frontend changed. Building and pushing frontend image..."
              docker compose build frontend && docker compose push frontend
              ;;
            2)
              echo "Only backend changed. Building and pushing backend image..."
              docker compose build backend && docker compose push backend
              ;;
            3)
              echo "Both frontend and backend changed. Building and pushing both images..."
              docker compose build && docker compose push
              ;;
            *)
              echo "No changes detected. Skipping build and push."
              ;;
          esac
  Deploy:
    needs: Build_and_Push
    runs-on: vm-prod
    if: needs.Build_and_Push.result == 'success'
    steps:
      - name: Deploy to Production Server
        run: $HOME/rice-price-predict/deploy.sh