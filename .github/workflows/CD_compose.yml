name: Docker Compose Updated # so re-Build&Push&Deploy images

on:
  push:
    branches:
      - main
    paths:
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
  
jobs:
  Build_and_Push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push Images
        run: |
          echo "Building images..."
          docker compose build
          echo "Pushing images..."
          docker compose push
  Update_prod_Compose:
    needs: Build_and_Push
    runs-on: vm-prod
    steps:
      - name: Update Production Compose File on Server
        run: |
          curl -o $HOME/rice-price-predict/docker-compose.yml https://raw.githubusercontent.com/RandrianantenainaBearisoa/rice_price_predict/refs/heads/main/docker-compose.prod.yml
  Deploy:
    needs: Update_prod_Compose
    runs-on: vm-prod
    steps:
      - name: Deploy to Production Server
        run: $HOME/rice-price-predict/deploy.sh